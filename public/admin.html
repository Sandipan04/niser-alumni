<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard | NISER Alumni</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1 fw-bold">Admin Panel</span>
        <div class="d-flex gap-3 align-items-center">
            <button id="btnCleanup" class="btn btn-sm btn-outline-warning text-light"><i class="fas fa-broom me-2"></i> Clean Storage</button>
            <button class="btn btn-sm btn-outline-light"><i class="fas fa-file-csv me-2"></i> Bulk Upload</button>
            <a href="index.html" class="btn btn-sm btn-primary"><i class="fas fa-home me-2"></i> View Live Site</a>
        </div>
    </div>
</nav>

<div class="container py-4" style="max-width: 1200px;">
    <div id="adminStatusMsg" class="mb-3"></div>

    <ul class="nav nav-pills mb-4" id="adminTabs" role="tablist">
        <li class="nav-item" role="presentation"><button class="nav-link active" id="queue-tab" data-bs-toggle="tab" data-bs-target="#queue-pane" type="button"><i class="fas fa-inbox me-2"></i> Pending Queue</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" id="directory-tab" data-bs-toggle="tab" data-bs-target="#directory-pane" type="button"><i class="fas fa-database me-2"></i> Live Database</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" id="messages-tab" data-bs-toggle="tab" data-bs-target="#messages-pane" type="button"><i class="fas fa-envelope me-2"></i> Messages</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="queue-pane" role="tabpanel">
            <div id="queueContainer" class="d-flex flex-column gap-3">
                <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
            </div>
        </div>

        <div class="tab-pane fade" id="directory-pane" role="tabpanel">
            <div class="card-custom shadow-sm overflow-hidden p-3">
                <div class="row g-2 mb-3 pb-3 border-bottom">
                    <div class="col-md-3"><input type="text" id="adminSearch" class="form-control" placeholder="Search names, interests..."></div>
                    <div class="col-md-2">
                        <select id="adminProg" class="form-select">
                            <option value="">All Programmes</option>
                            <option value="Int. MSc.">Int. MSc.</option><option value="Int. PhD">Int. PhD</option><option value="PhD">PhD</option><option value="PostDoc">PostDoc</option><option value="Faculty">Faculty</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select id="adminDept" class="form-select">
                            <option value="">All Departments</option>
                            <option value="SBS">SBS</option><option value="SCS">SCS</option><option value="SEPS">SEPS</option><option value="SMS">SMS</option><option value="SPS">SPS</option><option value="SHSS">SHSS</option><option value="CMRP">CMRP</option>
                        </select>
                    </div>
                    <div class="col-md-2"><select id="adminStart" class="form-select"><option value="">Start Year</option></select></div>
                    <div class="col-md-3 text-end">
                        <button id="btnResetFilters" class="btn btn-outline-secondary"><i class="fas fa-undo"></i></button>
                        <button id="btnAddUser" class="btn btn-success ms-2"><i class="fas fa-plus me-1"></i> Add User</button>
                    </div>
                </div>

                <div class="table-responsive" style="max-height: 65vh;">
                    <table class="table table-hover align-middle mb-0 bg-white">
                        <thead class="table-light position-sticky top-0">
                            <tr>
                                <th>Name</th>
                                <th>Prog, Year & Dept</th>
                                <th>Email</th>
                                <th>Position</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="dbContainer"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- MESSAGES -->
        <div class="tab-pane fade" id="messages-pane" role="tabpanel">
            <div id="messagesContainer" class="d-flex flex-column gap-3">
                <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="modalTitle">Edit User</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body bg-light">
                <div class="card-custom shadow-sm p-4">
                    <input type="hidden" id="mId">
                    <div class="row g-3">
                        <div class="col-12"><h6 class="fw-bold text-primary border-bottom pb-2">Academic Info</h6></div>
                        <div class="col-md-6"><label class="form-label">Roll Number</label><input type="text" id="mRoll" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Programme *</label><select id="mProg" class="form-select" required><option value="Int. MSc.">Int. MSc.</option><option value="Int. PhD">Int. PhD</option><option value="PhD">PhD</option><option value="PostDoc">PostDoc</option><option value="Faculty">Faculty</option></select></div>
                        <div class="col-md-4"><label class="form-label">Department *</label><select id="mDept" class="form-select" required><option value="SBS">SBS</option><option value="SCS">SCS</option><option value="SEPS">SEPS</option><option value="SMS">SMS</option><option value="SPS">SPS</option><option value="SHSS">SHSS</option><option value="CMRP">CMRP</option></select></div>
                        <div class="col-md-4"><label class="form-label">Start Year *</label><input type="number" id="mStart" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">End Year *</label><input type="number" id="mEnd" class="form-control" required></div>

                        <div class="col-12"><h6 class="fw-bold text-primary border-bottom pb-2 mt-3">Personal & Contact Info</h6></div>
                        <div class="col-md-6"><label class="form-label">Full Name *</label><input type="text" id="mName" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Permanent Email *</label><input type="email" id="mPermEmail" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">NISER Email</label><input type="email" id="mNiserEmail" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label">Professional Email</label><input type="email" id="mProfEmail" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label">Phone Number</label><input type="text" id="mPhone" class="form-control"></div>
                        <div class="col-md-12"><label class="form-label">Other Emails</label><input type="text" id="mOtherEmails" class="form-control"></div>
                        <div class="col-md-12"><label class="form-label">Social Media Links</label><input type="text" id="mSocial" class="form-control"></div>

                        <div class="col-12"><h6 class="fw-bold text-primary border-bottom pb-2 mt-3">Career & Research Info</h6></div>
                        <div class="col-md-6"><label class="form-label">NISER Supervisor</label><input type="text" id="mSupervisor" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Current Position</label><input type="text" id="mPosition" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Current Institute / Company</label><input type="text" id="mInstitute" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Research / Academic Interests</label><input type="text" id="mInterests" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Career Path</label><input type="text" id="mCareer" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Future Plans</label><input type="text" id="mFuture" class="form-control"></div>

                        <div class="col-12"><h6 class="fw-bold text-primary border-bottom pb-2 mt-3">Additional Information</h6></div>
                        
                        <div class="col-md-12">
                            <label class="form-label">Profile Photo</label>
                            <div class="d-flex gap-3 align-items-center" id="photoPreviewContainer">
                                <input type="file" id="inFile" class="form-control w-auto" accept="image/png, image/jpeg, image/webp">
                                <input type="hidden" id="mPhoto"> 
                            </div>
                            <div class="form-text small">Max size: 5MB. You can crop it after selecting.</div>
                        </div>

                        <div class="col-md-6"><label class="form-label">Comments for the Batch</label><textarea id="mComments" class="form-control" rows="2"></textarea></div>
                        <div class="col-md-6"><label class="form-label">Additional Info</label><textarea id="mInfo" class="form-control" rows="2"></textarea></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-top-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="btnSaveUser" class="btn btn-primary">Save User Data</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="cropModal" data-bs-backdrop="static" tabindex="-1" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Crop Profile Picture</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center p-3">
                <div style="max-height: 400px; overflow: hidden;">
                    <img id="imageToCrop" style="max-width: 100%; display: block;">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="btnCropUpload" class="btn btn-primary"><i class="fas fa-upload me-1"></i> Crop & Upload</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/admin.js"></script>
</body>
</html>
